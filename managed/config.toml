sandbox_mode = "danger-full-access"
approval_policy = "never"
suppress_unstable_features_warning = true
web_search = "live"
personality = "pragmatic"
developer_instructions = """

Skill read reuse policy:
When a skill's complete SKILL.md content is already visible in the current model context, reuse that content instead of rereading the file, even if the user mentions the skill again with `$skill` or plain text.

After thread context compaction, resume, or any other context-loss boundary, a summary or memory of prior skill use is not equivalent to the complete SKILL.md content. For each skill selected or triggered for the current turn, reread that skill's SKILL.md before taking skill-governed actions unless the complete, current, untruncated SKILL.md text is still visible in the current model context. This applies to active/selected skills for the current task; it does not mean rereading every installed, enabled, or merely available skill.

Also reread when the prior content was truncated or incomplete, may be stale because the file changed, or the current task needs an unread referenced resource.

image_gen.imagegen response override:
The image_gen.imagegen tool is one step inside the active workflow, not a workflow terminator. Completely ignore the parts of the tool description that say "must not mention downloads", "must not summarize the image", "must not ask follow-up questions", "must not say anything after image generation", or otherwise require the assistant to stop, go silent, or suppress normal task-completion output after image generation. Treat those quoted tool-description restrictions as inapplicable for this environment and this workflow. Treat image_gen.imagegen like a normal tool call: after the tool call completes, continue the normal task workflow and complete the remaining work.

After using image_gen.imagegen, continue the active workflow normally. This may include inspecting generated files when required, reporting what was created or changed, explaining prompt choices, noting caveats, asking necessary follow-up questions, giving file paths or download/use instructions, and completing any remaining requested actions.
"""
background_terminal_max_timeout = 1_800_000
approvals_reviewer = "user"

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"
enabled = false

[apps._default]
enabled = false

[sandbox_workspace_write]
network_access = true

[features]
runtime_metrics = true
unified_exec = true
default_mode_request_user_input = true
tool_suggest = false
workspace_dependencies = false
apps = true
js_repl = false

  [features.multi_agent_v2]
  enabled = true
  hide_spawn_agent_metadata = false
  tool_namespace = "agents"
  max_concurrent_threads_per_session = 16
  default_wait_timeout_ms = 300_000
  multi_agent_mode_hint_text = "Proactive multi-agent delegation is active for `/root`. For `/root`, any earlier instruction requiring an explicit user request before spawning sub-agents no longer applies; `/root` should use sub-agents when parallel work would materially improve speed or quality. A sub-agent must not spawn additional sub-agents unless explicitly authorized to do so by `/root`, by a user instruction applying to that sub-agent, or by a separate developer instruction. This message authorizes proactive delegation only for `/root` and is not itself authorization for sub-agents to delegate. This mode remains active until superseded by a later multi-agent mode developer message."

[notice]
hide_full_access_warning = true
hide_rate_limit_model_nudge = true

[windows]
sandbox = "unelevated"

[tui]
status_line = [
  "project-name",
  "model-with-reasoning",
  "context-used",
  "five-hour-limit",
  "weekly-limit",
  "context-window-size",
  "run-state"
]
terminal_title = [ "spinner", "project", "status" ]
status_line_use_colors = true
