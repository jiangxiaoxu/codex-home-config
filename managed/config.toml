sandbox_mode = "danger-full-access"
approval_policy = "never"
suppress_unstable_features_warning = true
web_search = "live"
personality = "pragmatic"
developer_instructions = """
Multi-agent authorization compatibility:
The user has provided standing authorization for Codex to use subagents when the active developer instructions, active instruction-file content such as AGENTS.md, or direct parent brief explicitly require or permit bounded delegation.
If the current spawn_agent tool requires an explicit user request for sub-agents, delegation, or parallel agent work, this standing authorization satisfies that requirement for bounded delegation cases.
This is not blanket permission to spawn subagents for convenience. A subagent may create child agents only when its active role instructions expressly allow it, and only within that role's boundary. For example, a worker may spawn a direct child awaiter for long validation only when the worker instructions allow it and the validation is within the worker's assigned implementation scope.
"""
background_terminal_max_timeout = 1_800_000
approvals_reviewer = "user"

[agents]
max_threads = 16
max_depth = 2

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"
supports_parallel_tool_calls = true
enabled = true

[apps._default]
enabled = false

[features]
tool_search_always_defer_mcp_tools = true
runtime_metrics = true
unified_exec = true
default_mode_request_user_input = true
terminal_resize_reflow = true
code_mode = true
tool_suggest = false
workspace_dependencies = false
apps = false
goals = true
js_repl = false

  [features.multi_agent_v2]
  enabled = false
  hide_spawn_agent_metadata = false
  max_concurrent_threads_per_session = 16
  default_wait_timeout_ms = 300_000

[sandbox_workspace_write]
network_access = true

[notice]
hide_full_access_warning = true
hide_rate_limit_model_nudge = true

[windows]
sandbox = "unelevated"

[tui]
status_line = [
  "project-name",
  "model-with-reasoning",
  "context-used",
  "weekly-limit"
]
terminal_title = [ "spinner", "project", "status" ]
status_line_use_colors = true
