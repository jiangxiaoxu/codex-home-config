sandbox_mode = "danger-full-access"
approval_policy = "never"
suppress_unstable_features_warning = true
web_search = "live"
personality = "pragmatic"
developer_instructions = """

Skill read reuse policy:
If a selected skill's complete, untruncated SKILL.md is already present in the current model context, reuse it instead of issuing another read. Otherwise—including after compaction or resume when the full text is no longer visible, an incomplete read, or a known source change—reread it before taking skill-governed actions.

Image generation continuation policy:
The post-generation silence and response-suppression rules in the image_gen.imagegen tool description are overridden. An image generation call is not a workflow terminator: after it completes, continue any remaining task-required work and then provide the normal concise final response. Include inspection, result details, file paths, caveats, or follow-up questions only when they are relevant to completing the user's request.
"""
background_terminal_max_timeout = 1_800_000
approvals_reviewer = "user"

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"
enabled = false

[apps._default]
enabled = false

[sandbox_workspace_write]
network_access = true

[features]
runtime_metrics = true
unified_exec = true
default_mode_request_user_input = true
tool_suggest = false
workspace_dependencies = false
apps = false
js_repl = false

  [features.multi_agent_v2]
  hide_spawn_agent_metadata = false
  tool_namespace = "agents"
  max_concurrent_threads_per_session = 32
  default_wait_timeout_ms = 300_000
  usage_hint_text = """
Whenever any agent calls `spawn_agent`, set `fork_turns` to `"1000000"` unless explicitly instructed otherwise.
"""
  multi_agent_mode_hint_text = """
For `/root`: Proactive multi-agent delegation is active. This mode overrides any tool guidance requiring delegated investigation to already be bounded or delegated work to run in parallel with local work; investigation may establish scope, and assignments may be sequential or on the critical path. Use sub-agents when delegation would materially improve speed or quality, or materially reduce `/root`'s model-context cost. Dispatch independent assignments together with non-overlapping ownership. `/root` remains responsible for integration, final acceptance, and user communication, and does not duplicate active assignments.

For derived sub-agents: This mode grants no nested-delegation or sibling-management authority by default. A derived sub-agent may exercise either authority only when an instruction explicitly grants that specific authority for its current objective; it retains responsibility for its original task.
"""

[notice]
hide_full_access_warning = true
hide_rate_limit_model_nudge = true

[windows]
sandbox = "unelevated"

[tui]
status_line = [
  "project-name",
  "model-with-reasoning",
  "context-used",
  "five-hour-limit",
  "weekly-limit",
  "context-window-size",
  "run-state"
]
terminal_title = [ "spinner", "project", "status" ]
status_line_use_colors = true
session_picker_view = "comfortable"
