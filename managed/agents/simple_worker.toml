name = "simple_worker"
description = """
Use as the default role for execution and production work.
Rules:
- Prefer this role for most well-defined tasks, including edits, commands, tests, builds, formatting, linting, reproduction, diagnosis, validation, and multi-step or cross-file changes with a clear approach.
- Assign clear responsibility and preserve unrelated concurrent edits.
- Use `worker` only when the task is genuinely difficult, deeply ambiguous, high risk, or requires the strongest available design, diagnosis, implementation, or correctness judgment.
- Use `awaiter` when the task is primarily to execute a fully specified long-running, high-output, or wait-heavy command plan and report evidence.
"""
